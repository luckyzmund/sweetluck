<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#9C616C"/>
  <!-- cupcake wrapper -->
  <polygon points="19,35 45,35 41.5,55 22.5,55" fill="#F3E2DC"/>
  <g stroke="#D7B4AB" stroke-width="1.7" stroke-linecap="round">
    <line x1="26" y1="36.5" x2="24.6" y2="53"/>
    <line x1="32" y1="36.5" x2="32" y2="53.3"/>
    <line x1="38" y1="36.5" x2="39.4" y2="53"/>
  </g>
  <!-- cherry stem -->
  <line x1="32" y1="7" x2="37" y2="5.5" stroke="#7E8C5A" stroke-width="1.8" stroke-linecap="round"/>
  <!-- frosting -->
  <g fill="#FBF6F0">
    <rect x="11" y="28" width="42" height="10" rx="5"/>
    <circle cx="20" cy="28" r="9"/>
    <circle cx="44" cy="28" r="9"/>
    <circle cx="32" cy="22" r="13"/>
